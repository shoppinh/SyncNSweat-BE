services:
  db:
    image: postgres:16-alpine
    container_name: syncnsweat-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syncnsweat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-syncnsweat}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.11-management
    container_name: syncnsweat-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncnsweat-app
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.compose}
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-syncnsweat}
      API_URL: ${API_URL:-http://localhost:8000}
      SPOTIFY_REDIRECT_URL: ${SPOTIFY_REDIRECT_URL:-http://localhost:8000}
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker-ai-generation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncnsweat-worker-ai-generation
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.compose}
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-syncnsweat}
      API_URL: ${API_URL:-http://localhost:8000}
      SPOTIFY_REDIRECT_URL: ${SPOTIFY_REDIRECT_URL:-http://localhost:8000}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python -m app.workers.ai_generation_worker

  worker-context:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncnsweat-worker-context
    restart: unless-stopped
    env_file:
