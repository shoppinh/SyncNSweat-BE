      API_URL: ${API_URL:-http://localhost:8000}
      SPOTIFY_REDIRECT_URL: ${SPOTIFY_REDIRECT_URL:-http://localhost:8000}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: python -m app.workers.context_worker

  worker-exercise:
    build:
      context: .
